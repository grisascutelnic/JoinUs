<!doctype html>
<html lang="ro" xmlns:th="http://www.thymeleaf.org">
    <head>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1">

        <meta name="description" content="Creeaza sau editeaza o activitate in comunitatea JoinUs.">
        <meta name="author" content="">

        <title th:text="${formTitle != null ? formTitle + ' - JoinUs' : 'Creare activitate - JoinUs'}">Creare activitate - JoinUs</title>

        <!-- CSS FILES -->
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,wght@0,400;0,500;0,700;1,400&display=swap" rel="stylesheet">
        <link href="/css/bootstrap.min.css" rel="stylesheet">
        <link href="/css/bootstrap-icons.css" rel="stylesheet">
        <link href="/css/styles.css" rel="stylesheet">
    </head>

    <body class="page-auth page-create-activity">
        <main>
            <header th:replace="~{fragments/navbar :: navbar}"></header>

            <section class="auth-section section-padding">
                <div class="container">
                    <div class="row justify-content-center">
                        <div class="col-lg-11 col-xl-10 text-center">
                            <h3 class="mb-3" th:text="${formTitle != null ? formTitle : 'Formular activitate'}">Formular activitate</h3>
                            <p class="auth-subtitle" th:text="${formSubtitle != null ? formSubtitle : 'Completeaza detaliile si alege o imagine.'}">Completeaza detaliile si alege o imagine.</p>

                            <form class="custom-form auth-form activity-form-grid" th:attr="action=${formAction != null ? formAction : '/activities'}" th:object="${activityForm}" method="post" role="form" enctype="multipart/form-data">
                                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">

                                <div class="activity-card activity-card-left">
                                    <div class="activity-alert" th:if="${#fields.hasErrors('*')}">
                                        <div class="alert alert-danger mb-0">
                                            Completează toate câmpurile obligatorii corect.
                                        </div>
                                    </div>
                                    <div class="activity-card-header">
                                        <h4>Obligatoriu</h4>
                                        <p>Completează datele esențiale pentru activitate.</p>
                                    </div>
                                    <input type="text" th:field="*{title}" class="form-control" placeholder="Titlu activitate" required>
                                    <textarea th:field="*{description}" class="form-control" rows="3" placeholder="Descriere scurtă" required></textarea>

                                    <div class="row g-3">
                                        <div class="col-md-6">
                                            <input type="date" id="date" name="date" class="form-control"
                                                   th:value="${activityForm.date != null ? #temporals.format(activityForm.date, 'yyyy-MM-dd') : ''}"
                                                   th:min="${(editMode != null and editMode) ? null : #temporals.format(#temporals.createNow(), 'yyyy-MM-dd')}" required>
                                        </div>
                                        <div class="col-md-6">
                                            <input type="time" id="time" name="time" class="form-control"
                                                   th:value="${activityForm.time != null ? #temporals.format(activityForm.time, 'HH:mm') : ''}" required>
                                        </div>
                                    </div>

                                    <input type="text" th:field="*{location}" class="form-control" placeholder="Locație (oraș/raion/sat)" required>
                                    <input type="text" th:field="*{address}" class="form-control" placeholder="Adresă completă" required>

                                    <div class="row g-3">
                                        <div class="col-md-6">
                                            <input type="number" th:field="*{capacity}" class="form-control" min="1" max="200" placeholder="Număr persoane" required>
                                        </div>
                                        <div class="col-md-6">
                                            <select th:field="*{category}" class="form-control">
                                                <option value="Comunitate">Comunitate</option>
                                                <option value="Sport">Sport</option>
                                                <option value="Wellness">Wellness</option>
                                                <option value="Outdoor">Outdoor</option>
                                                <option value="Cultura">Cultura</option>
                                                <option value="Social">Social</option>
                                                <option value="Educatie">Educatie</option>
                                                <option value="Tech">Tech</option>
                                            </select>
                                        </div>
                                    </div>
                                </div>

                                <div class="activity-card activity-card-right">
                                    <div class="image-actions-split">
                                        <section class="image-action-pane image-action-pane--upload">
                                            <button type="button" class="btn image-action-tile" id="uploadImageBtn">Incarca imagine</button>
                                            <input type="file" id="cloudinaryFile" name="imageFile" accept="image/*" class="d-none">
                                            <input type="hidden" th:field="*{imageUrl}" id="cloudinaryUrl">
                                            <input type="hidden" th:field="*{imageChoice}" id="generatedImageUrl">
                                        </section>

                                        <div class="image-actions-or" aria-hidden="true">sau</div>

                                        <section class="image-action-pane image-action-pane--ai">
                                            <button type="button" class="btn image-action-tile" id="generateAiImageBtn">Genereaza imagine AI</button>
                                        </section>
                                    </div>

                                    <div class="image-preview-stage">
                                        <div class="ai-loading d-none" id="aiLoadingIndicator">
                                            <span class="ai-loading-spinner" aria-hidden="true"></span>
                                        </div>
                                        <div class="image-inline-error d-none" id="cloudinaryError"></div>
                                        <div class="image-inline-error d-none" id="generatedImageError"></div>
                                        <div class="image-preview-wrap d-none" id="generatedPreviewWrap">
                                            <img id="generatedPreviewImage" class="image-preview-image" alt="Preview imagine activitate">
                                        </div>
                                        <div class="image-preview-placeholder" id="imagePreviewPlaceholder" aria-hidden="true">
                                            <i class="bi bi-image image-preview-icon"></i>
                                        </div>
                                    </div>
                                </div>

                                <div class="activity-form-actions">
                                    <button type="submit" class="form-control" id="submitActivity" th:text="${submitLabel != null ? submitLabel : 'Creeaza activitate'}">Creeaza activitate</button>
                                </div>
                            </form>
                        </div>
                    </div>
                </div>
            </section>
        </main>

        <footer th:replace="~{fragments/footer :: footer}"></footer>

        <!-- JAVASCRIPT FILES -->
        <script src="/js/jquery.min.js"></script>
        <script src="/js/bootstrap.bundle.min.js"></script>
        <script src="/js/jquery.sticky.js"></script>
        <script src="/js/custom.js"></script>
        <script th:inline="javascript">
            (function () {
                const cloudName = /*[[${cloudinaryCloudName}]]*/ "";
                const uploadPreset = /*[[${cloudinaryUploadPreset}]]*/ "";
                const fileInput = document.getElementById('cloudinaryFile');
                const uploadBtn = document.getElementById('uploadImageBtn');
                const uploadError = document.getElementById('cloudinaryError');
                const urlInput = document.getElementById('cloudinaryUrl');
                const generatedInput = document.getElementById('generatedImageUrl');
                const generateBtn = document.getElementById('generateAiImageBtn');
                const aiLoadingIndicator = document.getElementById('aiLoadingIndicator');
                const generatedError = document.getElementById('generatedImageError');
                const generatedPreviewWrap = document.getElementById('generatedPreviewWrap');
                const generatedPreviewImage = document.getElementById('generatedPreviewImage');
                const imagePreviewPlaceholder = document.getElementById('imagePreviewPlaceholder');
                const form = document.querySelector('form.auth-form');
                const submitBtn = document.getElementById('submitActivity');
                const csrfInput = document.querySelector('input[name="_csrf"]');
                let isUploading = false;
                const canClientUpload = Boolean(cloudName && uploadPreset);

                if (!fileInput) {
                    return;
                }

                const showUploadError = (text) => {
                    if (!uploadError) {
                        return;
                    }
                    if (!text) {
                        uploadError.textContent = '';
                        uploadError.classList.add('d-none');
                        return;
                    }
                    uploadError.textContent = text;
                    uploadError.classList.remove('d-none');
                };

                const showGenerateError = (text) => {
                    if (!generatedError) {
                        return;
                    }
                    if (!text) {
                        generatedError.textContent = '';
                        generatedError.classList.add('d-none');
                        return;
                    }
                    generatedError.textContent = text;
                    generatedError.classList.remove('d-none');
                };

                const setUploading = (loading) => {
                    if (uploadBtn) {
                        uploadBtn.disabled = loading;
                        uploadBtn.textContent = loading ? 'Se incarca imaginea...' : 'Incarca imagine';
                    }
                };

                if (uploadBtn) {
                    uploadBtn.addEventListener('click', () => fileInput.click());
                }

                fileInput.addEventListener('change', async () => {
                    const file = fileInput.files && fileInput.files[0];
                    if (!file) {
                        return;
                    }
                    showUploadError('');
                    renderGeneratedPreview(URL.createObjectURL(file));

                    if (urlInput) {
                        urlInput.value = '';
                    }

                    if (!canClientUpload) {
                        return;
                    }

                    isUploading = true;
                    if (submitBtn) {
                        submitBtn.disabled = true;
                    }
                    setUploading(true);
                    const formData = new FormData();
                    formData.append('file', file);
                    formData.append('upload_preset', uploadPreset);

                    try {
                        const response = await fetch(`https://api.cloudinary.com/v1_1/${cloudName}/image/upload`, {
                            method: 'POST',
                            body: formData
                        });
                        if (!response.ok) {
                            throw new Error('Upload failed');
                        }
                        const data = await response.json();
                        if (!data.secure_url) {
                            throw new Error('Missing URL');
                        }
                        urlInput.value = data.secure_url;
                        fileInput.value = '';
                    } catch (error) {
                        urlInput.value = '';
                        showUploadError('Upload esuat. Incearca din nou.');
                    } finally {
                        isUploading = false;
                        setUploading(false);
                        if (submitBtn) {
                            submitBtn.disabled = false;
                        }
                    }
                });

                function getGenerationPayload() {
                    const title = (document.querySelector('input[name="title"]')?.value || '').trim();
                    const description = (document.querySelector('textarea[name="description"]')?.value || '').trim();
                    return { title, description };
                }

                async function generateImageViaServer() {
                    const payload = getGenerationPayload();
                    const body = new URLSearchParams();
                    body.set('title', payload.title);
                    body.set('description', payload.description);

                    const headers = {
                        'Content-Type': 'application/x-www-form-urlencoded',
                        'X-Requested-With': 'XMLHttpRequest'
                    };
                    if (csrfInput && csrfInput.value) {
                        headers['X-CSRF-TOKEN'] = csrfInput.value;
                    }

                    const response = await fetch('/api/activities/generate-image', {
                        method: 'POST',
                        headers,
                        body: body.toString()
                    });
                    if (!response.ok) {
                        throw new Error('Generation failed');
                    }

                    const data = await response.json();
                    if (!data.imageUrl) {
                        throw new Error('Missing imageUrl');
                    }
                    return data.imageUrl;
                }

                function renderGeneratedPreview(url) {
                    if (!generatedPreviewWrap || !generatedPreviewImage) {
                        return;
                    }
                    generatedPreviewImage.src = url;
                    generatedPreviewWrap.classList.remove('d-none');
                    if (imagePreviewPlaceholder) {
                        imagePreviewPlaceholder.classList.add('d-none');
                    }
                }

                if (generateBtn) {
                    generateBtn.addEventListener('click', async () => {
                        showGenerateError('');
                        generateBtn.disabled = true;
                        if (aiLoadingIndicator) {
                            aiLoadingIndicator.classList.remove('d-none');
                        }
                        try {
                            const imageUrl = await generateImageViaServer();
                            if (generatedInput) {
                                generatedInput.value = imageUrl;
                            }
                            renderGeneratedPreview(imageUrl);
                        } catch (error) {
                            showGenerateError('Generarea AI a esuat momentan. Incearca din nou.');
                        } finally {
                            generateBtn.disabled = false;
                            if (aiLoadingIndicator) {
                                aiLoadingIndicator.classList.add('d-none');
                            }
                        }
                    });
                }

                if (generatedInput && generatedInput.value && generatedInput.value.trim() !== '') {
                    const existing = generatedInput.value.trim();
                    const normalized = existing.replace('https://image.pollinations.ai/prompt/', 'https://gen.pollinations.ai/image/');
                    if (generatedInput) {
                        generatedInput.value = normalized;
                    }
                    renderGeneratedPreview(normalized);
                }

                if (urlInput && urlInput.value && urlInput.value.trim() !== '') {
                    renderGeneratedPreview(urlInput.value.trim());
                }

                if (form) {
                    form.addEventListener('submit', (event) => {
                        if (isUploading) {
                            event.preventDefault();
                            showUploadError('Asteapta finalizarea upload-ului.');
                            return;
                        }
                        if (canClientUpload && urlInput && urlInput.value && fileInput) {
                            fileInput.value = '';
                        }
                        const hasFile = fileInput.files && fileInput.files.length > 0;
                        if (canClientUpload && hasFile && (!urlInput.value || urlInput.value.trim() === '')) {
                            event.preventDefault();
                            showUploadError('Imaginea nu s-a incarcat inca. Reincearca.');
                        }
                    });
                }

            })();
        </script>
    </body>
</html>
